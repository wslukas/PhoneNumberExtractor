<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lukas Phone Number Extractor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --border:    #2a2f3f;
      --accent:    #4af0a8;
      --accent-dim:#1d6647;
      --text:      #d4d8e8;
      --muted:     #5a6080;
      --danger:    #c0392b;
      --danger-dim:#4a1a18;
      --radius:    6px;
      --mono:      'IBM Plex Mono', 'Courier New', monospace;
      --sans:      'IBM Plex Sans', system-ui, sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 680px;
      margin-bottom: 28px;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .wordmark::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    h1 {
      font-family: var(--mono);
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      font-family: var(--sans);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── Pane ── */
    .pane { padding: 0; }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: #13171f;
    }

    .pane-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .pill {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      transition: all 0.2s;
    }

    .pill.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    textarea {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
      padding: 16px;
      min-height: 140px;
      caret-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
      opacity: 0.7;
    }

    textarea:focus { background: #12161e; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      position: relative;
    }

    .divider-icon {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--surface);
      padding: 0 10px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--muted);
      line-height: 1;
    }

    /* ── Output ── */
    .output-block {
      padding: 16px;
      min-height: 72px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      color: var(--accent);
      word-break: normal;
      white-space: pre-wrap;
      transition: opacity 0.15s;
    }

    .output-block.empty {
      color: var(--muted);
      opacity: 0.5;
      font-style: italic;
    }

    /* ── Footer ── */
    .card-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: #13171f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .count-badge {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      transition: color 0.2s;
    }

    .count-badge.has-results { color: var(--accent); }

    /* ── Button group ── */
    .btn-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s, opacity 0.15s;
      user-select: none;
      white-space: nowrap;
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Copy Only — outlined accent */
    #copyOnlyBtn {
      background: transparent;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
    }

    #copyOnlyBtn:hover:not(:disabled) {
      background: rgba(74, 240, 168, 0.08);
      border-color: var(--accent);
    }

    #copyOnlyBtn.copied {
      border-color: var(--accent);
      color: #fff;
      background: rgba(74, 240, 168, 0.12);
    }

    /* Copy & Reset — filled accent */
    #copyResetBtn {
      background: var(--accent-dim);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
    }

    #copyResetBtn:hover:not(:disabled) {
      background: #28825a;
      border-color: var(--accent);
    }

    #copyResetBtn.copied {
      background: #1d6647;
      border-color: var(--accent);
      color: #fff;
    }

    /* Clear — subtle danger */
    #clearBtn {
      background: transparent;
      border: 1px solid #3a2020;
      color: #a05050;
    }

    #clearBtn:hover:not(:disabled) {
      background: rgba(192, 57, 43, 0.1);
      border-color: var(--danger);
      color: #e07070;
    }

    /* ── Hint bar ── */
    .hint {
      width: 100%;
      max-width: 680px;
      margin-top: 14px;
      display: flex;
      gap: 20px;
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    .hint-item {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
    }

    .kbd {
      display: inline-block;
      background: #1e2330;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      color: #8892b0;
    }
  </style>
</head>
<body>

  <header>
    <div class="wordmark">Utility</div>
    <h1>Lukas <span>Phone Number Extractor</span></h1>
    <p class="subtitle">Paste any text — numbers are pulled and formatted instantly.</p>
  </header>

  <div class="card">
    <!-- Input pane -->
    <div class="pane">
      <div class="pane-header">
        <span class="pane-label">Input</span>
        <span class="pill" id="inputPill">paste text here</span>
      </div>
      <textarea
        id="inputArea"
        placeholder="Paste raw text containing phone numbers here…&#10;&#10;e.g.  312-705-7100   11/2000 - 11/2000   Possible VoIP   ONVOY, LLC - IL"
        spellcheck="false"
        autocomplete="off"
      ></textarea>
    </div>

    <div class="divider"><span class="divider-icon">↓</span></div>

    <!-- Output pane -->
    <div class="pane">
      <div class="pane-header">
        <span class="pane-label">Output</span>
        <span class="pill" id="outputPill">formatted</span>
      </div>
      <div class="output-block empty" id="outputBlock">Results will appear here…</div>
    </div>

    <!-- Footer / actions -->
    <div class="card-footer">
      <span class="count-badge" id="countBadge">0 numbers found</span>
      <div class="btn-group">
        <button class="btn" id="clearBtn">Clear</button>
        <button class="btn" id="copyOnlyBtn" disabled>Copy</button>
        <button class="btn" id="copyResetBtn" disabled>Copy &amp; Reset</button>
      </div>
    </div>
  </div>

  <div class="hint">
    <span class="hint-item"><kbd class="kbd">Ctrl</kbd>+<kbd class="kbd">V</kbd> to paste</span>
    <span class="hint-item"><kbd class="kbd">Copy</kbd> copies output only</span>
    <span class="hint-item"><kbd class="kbd">Copy &amp; Reset</kbd> copies then clears all</span>
  </div>

  <script>
    (function () {
      const inputArea    = document.getElementById('inputArea');
      const outputBlock  = document.getElementById('outputBlock');
      const copyOnlyBtn  = document.getElementById('copyOnlyBtn');
      const copyResetBtn = document.getElementById('copyResetBtn');
      const clearBtn     = document.getElementById('clearBtn');
      const countBadge   = document.getElementById('countBadge');
      const inputPill    = document.getElementById('inputPill');
      const outputPill   = document.getElementById('outputPill');

      // ── Auto-focus on load ────────────────────────────────────────────
      inputArea.focus();

      // ── Extraction & formatting ───────────────────────────────────────
      // Targets the exact NXX-NXX-XXXX pattern from the source table.
      // Uses word boundaries so dates like 11/2000 and row numbers (1, 2, 3)
      // are never mistaken for part of a phone number.
      // Also handles: (312) 705-7100 | (312)705-7100 | 312.705.7100 |
      //               312 705 7100   | +1-312-705-7100
      function extractAndFormat(text) {
        // Replace tabs (from copied table cells) with spaces so the regex
        // doesn't see e.g. "7100\t11" as a continuous digit run
        const normalised = text.replace(/\t/g, ' ');

        // Match: optional country code, then 3-digit area, separator, 3-digit prefix, separator, 4-digit line
        const RE = /(?:\+?1[\s.\-])?(?:\(?\d{3}\)?[\s.\-])\d{3}[\s.\-]\d{4}/g;
        const rawMatches = normalised.match(RE);
        if (!rawMatches) return [];

        const seen = new Set();
        const formatted = [];

        for (const raw of rawMatches) {
          const digits = raw.replace(/\D/g, '');
          // Strip leading country code 1 if present
          const local = (digits.length === 11 && digits[0] === '1')
            ? digits.slice(1)
            : digits;

          if (local.length === 10) {
            const result = `(${local.slice(0,3)})-${local.slice(3,6)}-${local.slice(6)}`;
            if (!seen.has(result)) {
              seen.add(result);
              formatted.push(result);
            }
          }
        }
        return formatted;
      }

      // ── Update UI ─────────────────────────────────────────────────────
      function updateOutput() {
        const raw     = inputArea.value;
        const numbers = extractAndFormat(raw);
        const count   = numbers.length;
        const hasText = raw.trim() !== '';

        // Clear button is always enabled when there's any content
        clearBtn.disabled = !hasText;

        if (!hasText) {
          outputBlock.textContent = 'Results will appear here…';
          outputBlock.classList.add('empty');
          copyOnlyBtn.disabled  = true;
          copyResetBtn.disabled = true;
          countBadge.textContent = '0 numbers found';
          countBadge.classList.remove('has-results');
          inputPill.textContent = 'paste text here';
          inputPill.classList.remove('active');
          outputPill.classList.remove('active');
        } else if (count === 0) {
          outputBlock.textContent = 'No phone numbers detected.';
          outputBlock.classList.add('empty');
          copyOnlyBtn.disabled  = true;
          copyResetBtn.disabled = true;
          countBadge.textContent = '0 numbers found';
          countBadge.classList.remove('has-results');
          inputPill.textContent = `${raw.trim().split(/\s+/).length} words`;
          inputPill.classList.add('active');
          outputPill.classList.remove('active');
        } else {
          const output = numbers.join('\n');
          outputBlock.textContent = output;
          outputBlock.classList.remove('empty');
          copyOnlyBtn.disabled  = false;
          copyResetBtn.disabled = false;
          countBadge.textContent = `${count} number${count !== 1 ? 's' : ''} found`;
          countBadge.classList.add('has-results');
          inputPill.textContent = `${raw.trim().split(/\s+/).length} words`;
          inputPill.classList.add('active');
          outputPill.classList.add('active');
        }
      }

      // ── Clipboard helper ──────────────────────────────────────────────
      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        // Fallback for file:// or older browsers
        return new Promise((resolve, reject) => {
          try {
            const tmp = document.createElement('textarea');
            tmp.value = text;
            tmp.style.position = 'fixed';
            tmp.style.opacity  = '0';
            document.body.appendChild(tmp);
            tmp.select();
            document.execCommand('copy');
            document.body.removeChild(tmp);
            resolve();
          } catch (e) { reject(e); }
        });
      }

      function flashBtn(btn, label) {
        const original = btn.innerHTML;
        btn.innerHTML = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = original;
          btn.classList.remove('copied');
        }, 700);
      }

      // ── Input event ───────────────────────────────────────────────────
      inputArea.addEventListener('input', updateOutput);

      // ── Copy Only ─────────────────────────────────────────────────────
      copyOnlyBtn.addEventListener('click', function () {
        const output = outputBlock.textContent;
        if (!output || copyOnlyBtn.disabled) return;
        copyToClipboard(output)
          .then(() => flashBtn(copyOnlyBtn, 'Copy'))
          .catch(() => {
            copyOnlyBtn.textContent = 'Failed';
            setTimeout(() => { copyOnlyBtn.textContent = 'Copy'; }, 1500);
          });
      });

      // ── Copy & Reset ──────────────────────────────────────────────────
      copyResetBtn.addEventListener('click', function () {
        const output = outputBlock.textContent;
        if (!output || copyResetBtn.disabled) return;
        copyToClipboard(output)
          .then(() => {
            copyResetBtn.innerHTML = '✓ Copied!';
            copyResetBtn.classList.add('copied');
            setTimeout(() => {
              inputArea.value = '';
              updateOutput();
              copyResetBtn.innerHTML = 'Copy &amp; Reset';
              copyResetBtn.classList.remove('copied');
              inputArea.focus();
            }, 600);
          })
          .catch(() => {
            copyResetBtn.textContent = 'Failed';
            setTimeout(() => { copyResetBtn.innerHTML = 'Copy &amp; Reset'; }, 1500);
          });
      });

      // ── Clear ─────────────────────────────────────────────────────────
      clearBtn.addEventListener('click', function () {
        inputArea.value = '';
        updateOutput();
        inputArea.focus();
      });

      // Initial state
      updateOutput();

    })();
  </script>
</body>
</html>
